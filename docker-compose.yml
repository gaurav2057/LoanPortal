# SQL Server for Loan Portal (local development)
# Start: docker compose up -d
# Stop:  docker compose down

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: loanportal-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "LoanPortal@123"
    ports:
      - "1433:1433"
    volumes:
      - loanportal-sqldata:/var/opt/mssql

volumes:
  loanportal-sqldata:
